<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 KYC Admin Review</title>
  <style>
    body {
      background: #0a0f1d;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      color: #D4AF37;
      text-align: center;
      margin-bottom: 30px;
    }
    .pending {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    .approve { background: #2e8b57; color: white; }
    .reject { background: #b22222; color: white; }
    .loading { text-align: center; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 KYC Manual Review</h1>
    <div id="list">Loading pending applications...</div>
  </div>

  <script>
    // 🔑 REPLACE THIS WITH YOUR REAL ADMIN KEY FROM RENDER
    const ADMIN_API_KEY = 'ks1_kyc_admin_2026_secure_xyz789';
    const KYC_API = 'https://ks1-verification-kyc-system-2.onrender.com/api/kyc';

    async function loadPending() {
      const div = document.getElementById('list');
      try {
        const res = await fetch(`${KYC_API}/pending`, {
          headers: { 'x-admin-key': ADMIN_API_KEY }
        });

        if (!res.ok) throw new Error('Failed to fetch');

        const smes = await res.json();
        if (!Array.isArray(smes) || smes.length === 0) {
          div.innerHTML = '<p style="text-align:center; color:#aaa;">No pending applications.</p>';
          return;
        }

        div.innerHTML = smes.map(sme => `
          <div class="pending">
            <h3>SME ID: ${sme.smeId || 'N/A'}</h3>
            <p><strong>Business:</strong> ${sme.businessName || 'N/A'}</p>
            <p><strong>Owner:</strong> ${sme.ownerName || 'N/A'}</p>
            <p><strong>Risk Level:</strong> 
              <span style="color:${sme.riskLevel === 'HIGH' ? '#ff6b6b' : sme.riskLevel === 'MEDIUM' ? '#ffa500' : '#4caf50'}">
                ${sme.riskLevel || 'UNKNOWN'}
              </span>
            </p>
            <button class="btn approve" onclick="approve('${sme.smeId}', '${(sme.businessName || '').replace(/'/g, "\\'")}')">Approve</button>
            <button class="btn reject" onclick="reject('${sme.smeId}')">Reject</button>
          </div>
        `).join('');
      } catch (err) {
        div.innerHTML = `<p style="color:red; text-align:center;">Error: ${err.message}<br>Check admin key & KYC service status.</p>`;
        console.error('Admin review error:', err);
      }
    }

    async function approve(smeId, businessName) {
      if (!confirm(`Approve "${businessName}"?`)) return;
      try {
        const res = await fetch(`${KYC_API}/admin/approve`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': ADMIN_API_KEY
          },
          body: JSON.stringify({ smeId, businessName })
        });
        if (res.ok) {
          alert('✅ Approved');
          loadPending();
        } else {
          alert('❌ Approval failed');
        }
      } catch (err) {
        alert('Network error');
      }
    }

    async function reject(smeId) {
      const reason = prompt('Reason for rejection:');
      if (reason === null) return;
      try {
        const res = await fetch(`${KYC_API}/admin/reject`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': ADMIN_API_KEY
          },
          body: JSON.stringify({ smeId, reason })
        });
        if (res.ok) {
          alert('✅ Rejected');
          loadPending();
        } else {
          alert('❌ Rejection failed');
        }
      } catch (err) {
        alert('Network error');
      }
    }

    // Load on page load
    loadPending();
  </script>
</body>
</html>
