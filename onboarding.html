<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Onboarding – KS1 ALKEBULAN PAY</title>
  <style>
    body { background: #050A16; color: white; font-family: sans-serif; padding: 40px; }
    .form { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 10px; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #555; color: white; }
    button { background: #D4AF37; color: #000; padding: 12px; width: 100%; border: none; font-weight: bold; margin-top: 10px; }
    .error { color: red; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="form">
    <h2>Register Your Business</h2>
    <div id="error" class="error"></div>
    <form id="form">
      <input type="text" id="fullName" placeholder="Full Name" required />
      <input type="tel" id="phone" placeholder="WhatsApp Phone (+233...)" required />
      <input type="text" id="wallet" placeholder="Wallet (optional)" />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Get My KS1 Trade ID</button>
    </form>
    <a href="/" style="color:#D4AF37; display:block; margin-top:20px;">← Back</a>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const wallet = document.getElementById('wallet').value;
      const password = document.getElementById('password').value;

      try {
        // Step 1: Create account
        let res = await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/create-account', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, phone, wallet, password })
        });
        if (!res.ok) throw new Error('Account creation failed');
        const { userId } = await res.json();

        // Step 2: Create SME profile
        res = await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/create-sme-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId,
            businessName: `${fullName} Business`,
            businessType: 'Entrepreneur',
            industry: 'General',
            country: 'Ghana',
            city: 'Accra',
            address: 'Not specified'
          })
        });
        if (!res.ok) throw new Error('Profile creation failed');
        const { smeId } = await res.json();

        // Step 3: Submit → triggers KYC & Trade ID
        await fetch('https://ks1-sme-onboarding-system.onrender.com/api/onboarding/submit-onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ smeId })
        });

        alert(`✅ Success! Your KS1 Trade ID is: ${smeId}\n\nYou can now use all KS1 services.`);
        window.location.href = '/';
      } catch (err) {
        document.getElementById('error').textContent = err.message || 'Registration failed. Try again.';
      }
    });
  </script>
</body>
</html>
